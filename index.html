<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fireside AI Assistant</title>
<style>
  :root {
    --bg:          #f0f6fb;
    --surface:     #ffffff;
    --border:      #cde0ef;
    --brand:       #1a6fa8;
    --brand-dark:  #124f7a;
    --brand-light: #e8f3fb;
    --brand-mid:   #d0e9f7;
    --text:        #1a2a38;
    --muted:       #5a7a95;
    --positive:    #1a7a55;
    --warning:     #b86a10;
    --radius:      10px;
    --font:        'Inter', 'Segoe UI', Arial, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 12px;
    gap: 10px;
  }

  /* ── Tab bar ── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--brand-mid);
    border-radius: 8px;
    padding: 3px;
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 7px 0;
    border: none;
    background: transparent;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    color: var(--brand-dark);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .tab.active {
    background: var(--surface);
    color: var(--brand);
    box-shadow: 0 1px 3px rgba(26,111,168,0.15);
  }
  .tab svg { width: 13px; height: 13px; }

  /* ── Panels ── */
  .panel { display: none; flex-direction: column; flex: 1; min-height: 0; }
  .panel.active { display: flex; }

  /* ═══════════════════════════════════════════
     NARRATIVE PANEL
  ═══════════════════════════════════════════ */
  .narrative-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .narrative-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .meta-tag {
    background: var(--brand-light);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 7px;
    font-size: 11px;
    color: var(--brand);
    font-weight: 600;
  }
  .btn-regen {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--brand);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .btn-regen:hover:not(:disabled) { background: var(--brand-dark); }
  .btn-regen:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-regen svg { width: 12px; height: 12px; fill: #fff; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 0.7s linear infinite; }

  .narrative-body {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    font-size: 12.5px;
    line-height: 1.7;
    overflow-y: auto;
    flex: 1;
    box-shadow: 0 1px 4px rgba(26,111,168,0.06);
  }
  .narrative-body b { color: var(--brand); }

  .generated-ts {
    font-size: 10.5px;
    color: var(--muted);
    margin-top: 6px;
    flex-shrink: 0;
    text-align: right;
  }

  /* Skeleton */
  .skeleton {
    background: linear-gradient(90deg, #e8f3fb 25%, #d0e9f7 50%, #e8f3fb 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 4px;
    height: 12px;
    margin-bottom: 9px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }
  .sk-full  { width: 100%; }
  .sk-med   { width: 82%; }
  .sk-short { width: 55%; }

  /* ═══════════════════════════════════════════
     CHAT PANEL
  ═══════════════════════════════════════════ */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 4px 2px;
    min-height: 0;
  }

  .msg {
    display: flex;
    gap: 8px;
    align-items: flex-start;
    max-width: 100%;
  }
  .msg.user { flex-direction: row-reverse; }

  .msg-avatar {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }
  .msg.user  .msg-avatar { background: var(--brand); color: #fff; }
  .msg.bot   .msg-avatar { background: var(--brand-light); color: var(--brand); border: 1px solid var(--border); }

  .msg-bubble {
    padding: 9px 12px;
    border-radius: 10px;
    font-size: 12.5px;
    line-height: 1.6;
    max-width: calc(100% - 40px);
    word-break: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--brand);
    color: #fff;
    border-bottom-right-radius: 3px;
  }
  .msg.bot .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 3px;
  }
  .msg.bot .msg-bubble b { color: var(--brand); }

  /* Typing indicator */
  .typing-dots { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dots span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: bounce 1s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.30s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.7); opacity:.5; } 40% { transform: scale(1); opacity:1; } }

  /* Suggested questions */
  .suggestions {
    display: flex;
    flex-direction: column;
    gap: 5px;
    margin-top: 4px;
  }
  .suggestion-btn {
    background: var(--brand-light);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 11.5px;
    color: var(--brand-dark);
    cursor: pointer;
    text-align: left;
    transition: background 0.12s;
  }
  .suggestion-btn:hover { background: var(--brand-mid); }

  /* Chat input */
  .chat-input-row {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-shrink: 0;
  }
  .chat-input {
    flex: 1;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 8px 11px;
    font-size: 12.5px;
    font-family: var(--font);
    color: var(--text);
    background: var(--surface);
    outline: none;
    resize: none;
    min-height: 38px;
    max-height: 80px;
    transition: border-color 0.15s;
  }
  .chat-input:focus { border-color: var(--brand); }
  .chat-input::placeholder { color: var(--muted); }

  .btn-send {
    background: var(--brand);
    border: none;
    border-radius: 8px;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-send:hover:not(:disabled) { background: var(--brand-dark); }
  .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-send svg { width: 16px; height: 16px; fill: #fff; }

  /* Error */
  .error-box {
    background: #fff5f5;
    border: 1px solid #f5c0c0;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12px;
    color: #933;
  }

  /* Scrollbar styling */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ── Tab bar ── -->
<div class="tabs">
  <button class="tab active" onclick="switchTab('narrative', this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM8 13h8v1.5H8V13zm0 3h8v1.5H8V16zm0-6h3v1.5H8V10z"/></svg>
    Insights
  </button>
  <button class="tab" onclick="switchTab('chat', this)">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4a2 2 0 00-2 2v18l4-4h14a2 2 0 002-2V4a2 2 0 00-2-2zm-2 10H6v-2h12v2zm0-3H6V7h12v2z"/></svg>
    Ask AI
  </button>
</div>

<!-- ══════════════════════════════════════════
     NARRATIVE PANEL
══════════════════════════════════════════ -->
<div class="panel active" id="panel-narrative">
  <div class="narrative-header">
    <div class="narrative-meta" id="narrative-meta">
      <span class="meta-tag" id="meta-property">Loading…</span>
      <span class="meta-tag" id="meta-period"></span>
    </div>
    <button class="btn-regen" id="btn-regen" onclick="regenerateNarrative()">
      <svg id="regen-icon" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
      Refresh
    </button>
  </div>

  <div class="narrative-body" id="narrative-body">
    <div class="skeleton sk-full"></div>
    <div class="skeleton sk-med"></div>
    <div class="skeleton sk-full"></div>
    <div class="skeleton sk-short"></div>
    <div class="skeleton sk-full"></div>
    <div class="skeleton sk-med"></div>
    <div class="skeleton sk-full"></div>
  </div>

  <div class="generated-ts" id="generated-ts"></div>
</div>

<!-- ══════════════════════════════════════════
     CHAT PANEL
══════════════════════════════════════════ -->
<div class="panel" id="panel-chat">
  <div class="chat-messages" id="chat-messages">
    <!-- Welcome message + suggestions -->
    <div class="msg bot">
      <div class="msg-avatar">AI</div>
      <div>
        <div class="msg-bubble">
          Hi! I can answer questions about this property's financial performance. Try one of these:
        </div>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Which units have outstanding balances?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">How is NOI tracking vs budget?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">What's driving expenses this month?</button>
          <button class="suggestion-btn" onclick="sendSuggestion(this)">Which units are currently vacant?</button>
        </div>
      </div>
    </div>
  </div>

  <div class="chat-input-row">
    <textarea
      id="chat-input"
      class="chat-input"
      placeholder="Ask about revenue, expenses, units, delinquency…"
      rows="1"
      onkeydown="handleKey(event)"
      oninput="autoResize(this)"
    ></textarea>
    <button class="btn-send" id="btn-send" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ── CONFIG — replace these ────────────────────────────────────────────────────
const APPS_SCRIPT_URL = "YOUR_APPS_SCRIPT_WEB_APP_URL";   // from Deploy → Web App
const SECRET_TOKEN    = new URLSearchParams(window.location.search).get("token") || "";          // must match Apps Script setupKeys()
const PROPERTY_ID     = "GATEWAY";                         // passed from Looker via URL param
const PERIOD          = null;                              // null = latest; or "2026-01"
// ─────────────────────────────────────────────────────────────────────────────

// Read property/period from URL params (so one embed works for all properties)
const urlParams  = new URLSearchParams(window.location.search);
const PROP       = urlParams.get("property") || PROPERTY_ID;
const PER        = urlParams.get("period")   || PERIOD;

let chatHistory  = [];   // [{role, text}]
let isChatBusy   = false;


// ════════════════════════════════════════════
// TAB SWITCHING
// ════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
  btn.classList.add("active");
  document.getElementById(`panel-${name}`).classList.add("active");
}


// ════════════════════════════════════════════
// NARRATIVE
// ════════════════════════════════════════════
async function loadNarrative() {
  try {
    // Fetch latest narrative from Apps Script (which reads BigQuery)
    const url  = `${APPS_SCRIPT_URL}?action=getNarrative&property=${PROP}&period=${PER || ""}&token=${SECRET_TOKEN}`;
    const resp = await fetch(url);
    const data = await resp.json();

    if (data.status !== "ok") throw new Error(data.message);

    document.getElementById("meta-property").textContent = `📍 ${data.property_id}`;
    document.getElementById("meta-period").textContent   = `📅 ${data.period}`;
    document.getElementById("generated-ts").textContent  = `Generated: ${data.generated_at}`;

    const formatted = (data.narrative || "No narrative available.")
      .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
      .replace(/\n/g, "<br/>");

    document.getElementById("narrative-body").innerHTML = `<div>${formatted}</div>`;

  } catch (err) {
    document.getElementById("narrative-body").innerHTML =
      `<div class="error-box">⚠️ Could not load insights: ${err.message}<br/>Make sure the Apps Script is deployed as a web app.</div>`;
    document.getElementById("meta-property").textContent = `📍 ${PROP}`;
  }
}

async function regenerateNarrative() {
  const btn  = document.getElementById("btn-regen");
  const icon = document.getElementById("regen-icon");

  btn.disabled = true;
  icon.classList.add("spinning");

  document.getElementById("narrative-body").innerHTML = `
    <div class="skeleton sk-full"></div>
    <div class="skeleton sk-med"></div>
    <div class="skeleton sk-full"></div>
    <div class="skeleton sk-short"></div>
    <div class="skeleton sk-full"></div>
    <div class="skeleton sk-med"></div>`;

  try {
    const url  = `${APPS_SCRIPT_URL}?action=regenerate&property=${PROP}&period=${PER || ""}&token=${SECRET_TOKEN}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data.status !== "ok") throw new Error(data.message);
    await loadNarrative();
  } catch (err) {
    document.getElementById("narrative-body").innerHTML =
      `<div class="error-box">⚠️ Regeneration failed: ${err.message}</div>`;
  } finally {
    btn.disabled = false;
    icon.classList.remove("spinning");
  }
}


// ════════════════════════════════════════════
// CHAT
// ════════════════════════════════════════════
function sendSuggestion(btn) {
  const text = btn.textContent.trim();
  btn.closest(".suggestions").remove();
  sendMessage(text);
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 80) + "px";
}

async function sendMessage(overrideText) {
  if (isChatBusy) return;

  const input = document.getElementById("chat-input");
  const text  = (overrideText || input.value).trim();
  if (!text) return;

  input.value = "";
  input.style.height = "auto";

  // Append user message
  appendMessage("user", text);
  chatHistory.push({ role: "user", text });

  // Show typing indicator
  const typingId = appendTyping();
  isChatBusy = true;
  document.getElementById("btn-send").disabled = true;

  try {
    const resp = await fetch(APPS_SCRIPT_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        action:     "chat",
        token:      SECRET_TOKEN,
        propertyId: PROP,
        period:     PER,
        question:   text,
        history:    chatHistory.slice(-6)   // last 3 turns
      })
    });

    const data = await resp.json();
    removeTyping(typingId);

    if (data.status !== "ok") throw new Error(data.message);

    const answer = data.answer || "I couldn't find an answer for that.";
    appendMessage("bot", answer);
    chatHistory.push({ role: "bot", text: answer });

  } catch (err) {
    removeTyping(typingId);
    appendMessage("bot", `⚠️ Error: ${err.message}`);
  } finally {
    isChatBusy = false;
    document.getElementById("btn-send").disabled = false;
  }
}

function appendMessage(role, text) {
  const container = document.getElementById("chat-messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  const formatted = text
    .replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
    .replace(/\n- /g, "<br/>• ")
    .replace(/\n/g, "<br/>");

  div.innerHTML = `
    <div class="msg-avatar">${role === "user" ? "You" : "AI"}</div>
    <div class="msg-bubble">${formatted}</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return div;
}

function appendTyping() {
  const container = document.getElementById("chat-messages");
  const id = "typing-" + Date.now();
  const div = document.createElement("div");
  div.className = "msg bot";
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-bubble">
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}


// ── Boot ──────────────────────────────────────────────────────────────────────
loadNarrative();
</script>
</body>
</html>
